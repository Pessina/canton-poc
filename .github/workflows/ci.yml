name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: client

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install Daml SDK
        working-directory: .
        run: |
          curl -sSL https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Build DAR and generate codegen
        working-directory: .
        run: |
          dpm build
          dpm codegen-js .daml/dist/canton-mpc-poc-0.0.1.dar -o client/generated/model -s daml.js

      - name: Generate OpenAPI types
        run: pnpx openapi-typescript openapi.yaml -o generated/api/ledger-api.ts

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install Daml SDK
        working-directory: .
        run: |
          curl -sSL https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Build DAR and generate codegen
        working-directory: .
        run: |
          dpm build
          dpm codegen-js .daml/dist/canton-mpc-poc-0.0.1.dar -o client/generated/model -s daml.js

      - name: Generate OpenAPI types
        run: pnpx openapi-typescript openapi.yaml -o generated/api/ledger-api.ts

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
