name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: client

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build Daml codegen
        working-directory: .
        run: |
          docker build -t daml-builder -f .github/docker/Dockerfile.daml .
          docker run --rm -v "${{ github.workspace }}:/workspace" daml-builder \
            sh -c "dpm build && dpm codegen-js .daml/dist/canton-mpc-poc-0.0.1.dar -o client/generated/model -s daml.js"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Generate OpenAPI types
        run: pnpx openapi-typescript openapi.yaml -o generated/api/ledger-api.ts

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Build Daml codegen
        working-directory: .
        run: |
          docker build -t daml-builder -f .github/docker/Dockerfile.daml .
          docker run --rm -v "${{ github.workspace }}:/workspace" daml-builder \
            sh -c "dpm build && dpm codegen-js .daml/dist/canton-mpc-poc-0.0.1.dar -o client/generated/model -s daml.js"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Generate OpenAPI types
        run: pnpx openapi-typescript openapi.yaml -o generated/api/ledger-api.ts

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
